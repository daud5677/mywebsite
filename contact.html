<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">MyPortfolio</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <button id="darkModeBtn" onclick="toggleDarkMode()">🌙</button>
        </div>
    </nav>

    <div class="contact-container">
        <h1>Contact Me 📧</h1>
        <form onsubmit="sendMessage(event)">
            <input type="text" placeholder="Aapka Naam" required>
            <input type="email" placeholder="Aapka Email" required>
            <textarea rows="5" placeholder="Aapka Message" required></textarea>
            <button type="submit" class="btn">Send Message 🚀</button>
        </form>
    </div>

    <footer>
        <p>© 2025 My Website. All rights reserved. ❤️</p>
    </footer>

    <script src="script.js"></script>
</body>
